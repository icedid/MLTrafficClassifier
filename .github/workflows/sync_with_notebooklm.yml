name: sync_with_notebooklm

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**.md' # Only runs when you edit documentation
  workflow_dispatch:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vault
        uses: actions/checkout@v4

      - name: Aggregate Markdown Files
        run: |
          echo "# ML Traffic Classifier - Project Knowledge Base" > master_knowledge.md
          echo "Last Sync: $(date)" >> master_knowledge.md
          
          # Find all .md files inside the 'docs' folder.
          # IFS= read -r handles filenames with spaces correctly.
          find ./docs -type f -name "*.md" | while IFS= read -r file; do
            echo -e "\n\n--- DOCUMENT: $file ---\n" >> master_knowledge.md
            cat "$file" >> master_knowledge.md
          done

      - name: Push to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE }}
          filename: master_knowledge.md
          fileId: ${{ secrets.GDRIVE_FILE_ID }}  # Targeted update
          overwrite: true
