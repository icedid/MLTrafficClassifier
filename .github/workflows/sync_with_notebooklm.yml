name: Live Knowledge Base Sync

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**.md'
  workflow_dispatch:

jobs:
  sync-to-google-doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Google Dependencies
        run: pip install google-auth google-api-python-client

      - name: Aggregate & Push to Google Doc
        env:
          GDRIVE_BASE64: ${{ secrets.GDRIVE }}
          DOC_ID: "1b3-zzNzfAl4maIJ6VuQe0gv3UJsR-8RAzAeoGMjoNyg"
        run: |
          python - <<EOF
          import os
          import json
          import base64
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          def main():
              # 1. AUTHENTICATION
              encoded_creds = os.environ['GDRIVE_BASE64']
              creds_info = json.loads(base64.b64decode(encoded_creds).decode('utf-8'))
              creds = service_account.Credentials.from_service_account_info(creds_info)
              service = build('docs', 'v1', credentials=creds)

              # 2. AGGREGATE MARKDOWN FILES
              full_text = "ML Traffic Classifier - Knowledge Base\n"
              full_text += "======================================\n\n"
              
              for root, dirs, files in os.walk('docs'):
                  for filename in files:
                      if filename.endswith(".md"):
                          with open(os.path.join(root, filename), 'r') as f:
                              full_text += f"\n\n--- SOURCE: {filename} ---\n\n{f.read()}"
              
              # 3. UPDATE GOOGLE DOC
              doc_id = os.environ['DOC_ID']
              doc = service.documents().get(documentId=doc_id).execute()
              end_index = doc.get('body').get('content')[-1].get('endIndex') - 1

              requests = []
              if end_index > 1:
                  requests.append({
                      'deleteContentRange': {
                          'range': {'startIndex': 1, 'endIndex': end_index}
                      }
                  })
              
              requests.append({
                  'insertText': {
                      'location': {'index': 1}, 
                      'text': full_text
                  }
              })

              service.documents().batchUpdate(documentId=doc_id, body={'requests': requests}).execute()
              print("🎉 SUCCESS: Knowledge Base Updated!")

          if __name__ == "__main__":
              main()
          EOF
