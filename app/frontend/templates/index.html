<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Net-Sentinel Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#09090b] p-10 text-zinc-400">

    <div class="max-w-md mx-auto">
        <div class="bg-zinc-900/50 border border-zinc-800 rounded-2xl p-6">
            <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-4">
                Live Label Distribution
            </h3>
            
            <div hx-get="/api/v1/label-counts" 
                 hx-trigger="load, every 2s" 
                 hx-swap="innerHTML">
                
                <div class="flex items-center gap-2">
                    <div class="h-1.5 w-1.5 bg-indigo-500 animate-ping rounded-full"></div>
                    <span class="text-[10px] text-zinc-600 uppercase">Connecting to Engine...</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
