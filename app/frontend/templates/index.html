<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Traffic Classifier Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #09090b; color: #fafafa; }
        #conv-panel { transition: transform 0.25s ease; }
        #conv-panel.hidden-panel { transform: translateX(100%); }
    </style>
</head>
<body class="antialiased font-sans p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-end border-b border-zinc-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-indigo-500">Traffic<span class="text-zinc-100">Classifier</span></h1>
                <p class="text-zinc-500 text-sm mt-1">Real-time packet classification engine</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="text-[10px] font-mono uppercase tracking-widest text-zinc-400">Live Stream</span>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Labels List -->
            <div class="lg:col-span-1 bg-zinc-900/50 border border-zinc-800 p-6 rounded-2xl">
                <h2 class="text-sm font-semibold mb-4 text-zinc-400 uppercase tracking-wider">Classification Counts</h2>
                <div id="label-list"
                     hx-get="/api/v1/label-counts"
                     hx-trigger="every 2s"
                     class="min-h-[200px]">
                    <p class="text-zinc-600 italic text-sm">Initializing labels...</p>
                </div>
            </div>

            <!-- Distribution Chart -->
            <div class="lg:col-span-2 bg-zinc-900/50 border border-zinc-800 p-6 rounded-2xl flex flex-col items-center">
                <h2 class="text-sm font-semibold mb-1 text-zinc-400 uppercase tracking-wider self-start">Traffic Distribution</h2>
                <p class="text-[10px] text-zinc-600 font-mono self-start mb-6">Click a segment to inspect conversations</p>
                <div class="w-full max-w-[400px]">
                    <canvas id="trafficChart" style="cursor:pointer"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Conversation Detail Panel -->
    <div id="conv-panel" class="hidden-panel fixed top-0 right-0 h-full w-full max-w-lg bg-zinc-900 border-l border-zinc-800 shadow-2xl z-50 flex flex-col">
        <div class="flex items-center justify-between p-5 border-b border-zinc-800">
            <div>
                <h3 class="text-sm font-semibold text-zinc-100 uppercase tracking-wider" id="conv-panel-title">Conversations</h3>
                <p class="text-[10px] font-mono text-zinc-500 mt-0.5">Most recent first · max 50</p>
            </div>
            <button onclick="closePanel()" class="text-zinc-500 hover:text-zinc-200 transition-colors text-xl leading-none">&times;</button>
        </div>
        <div id="conv-panel-body" class="overflow-y-auto flex-1 p-5 space-y-3">
            <p class="text-zinc-600 italic text-xs">Loading...</p>
        </div>
    </div>
    <!-- Backdrop -->
    <div id="conv-backdrop" class="hidden fixed inset-0 bg-black/50 z-40" onclick="closePanel()"></div>

    <script>
        const COLORS = [
            '#6366f1', '#10b981', '#f59e0b',
            '#f97316', '#f43f5e', '#a855f7', '#0ea5e9'
        ];

        const ctx = document.getElementById('trafficChart').getContext('2d');
        let trafficChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: COLORS,
                    borderColor: '#18181b',
                    borderWidth: 2,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#a1a1aa', font: { family: 'ui-monospace', size: 10 } }
                    }
                },
                cutout: '70%',
                onClick: (event, elements) => {
                    if (!elements.length) return;
                    const label = trafficChart.data.labels[elements[0].index];
                    const color = COLORS[elements[0].index % COLORS.length];
                    showConversations(label, color);
                }
            }
        });

        async function updateChart() {
            try {
                const response = await fetch('/api/v1/label-counts/data');
                const data = await response.json();
                trafficChart.data.labels = Object.keys(data);
                trafficChart.data.datasets[0].data = Object.values(data);
                trafficChart.update();
            } catch (error) {
                console.error("Failed to fetch chart data", error);
            }
        }

        async function showConversations(label, color) {
            document.getElementById('conv-panel-title').textContent = label;
            document.getElementById('conv-panel-title').style.color = color;
            document.getElementById('conv-panel-body').innerHTML = '<p class="text-zinc-600 italic text-xs">Loading...</p>';
            openPanel();

            try {
                const res = await fetch(`/api/v1/conversations/${label}`);
                const convs = await res.json();
                renderConversations(convs, color);
            } catch (e) {
                document.getElementById('conv-panel-body').innerHTML = '<p class="text-rose-500 text-xs">Failed to load.</p>';
            }
        }

        function renderConversations(convs, color) {
            const body = document.getElementById('conv-panel-body');
            if (!convs.length) {
                body.innerHTML = '<p class="text-zinc-600 italic text-xs">No conversations classified yet for this category.</p>';
                return;
            }

            body.innerHTML = convs.map((c, i) => {
                const pct = Math.round(c.confidence * 100);
                return `
                <div class="bg-zinc-800/50 border border-zinc-700/50 rounded-xl p-4 space-y-2">
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] font-mono text-zinc-500">#${i + 1}</span>
                        <span class="text-[10px] font-mono px-2 py-0.5 rounded-full bg-zinc-700 text-zinc-300">${c.proto}</span>
                    </div>
                    <div class="font-mono text-xs text-zinc-100 flex items-center gap-2 flex-wrap">
                        <span class="text-zinc-400">${c.src}</span>
                        <span class="text-zinc-600">:${c.sport}</span>
                        <span class="text-zinc-600">→</span>
                        <span class="text-zinc-400">${c.dst}</span>
                        <span class="text-zinc-600">:${c.dport}</span>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-[10px] font-mono">
                            <span class="text-zinc-500">Confidence</span>
                            <span style="color:${color}">${pct}%</span>
                        </div>
                        <div class="w-full bg-zinc-700 rounded-full h-1.5">
                            <div class="h-1.5 rounded-full" style="width:${pct}%; background-color:${color}"></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function openPanel() {
            document.getElementById('conv-panel').classList.remove('hidden-panel');
            document.getElementById('conv-backdrop').classList.remove('hidden');
        }

        function closePanel() {
            document.getElementById('conv-panel').classList.add('hidden-panel');
            document.getElementById('conv-backdrop').classList.add('hidden');
        }

        setInterval(updateChart, 2000);
        updateChart();
    </script>
</body>
</html>
