<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net-Sentinel AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#09090b] text-zinc-400 antialiased min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="flex justify-between items-center mb-16">
            <div>
                <h1 class="text-zinc-100 text-xl font-bold tracking-tight">NET_SENTINEL <span class="text-indigo-500">01</span></h1>
                <p class="text-zinc-500 text-xs mt-1 uppercase tracking-widest font-medium">Traffic Classification Engine</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="h-2 w-2 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]"></div>
                <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Inference Live</span>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-8">
                <div id="classification-display" 
                     hx-get="/api/v1/traffic-update" 
                     hx-trigger="load, every 2s"
                     class="group">
                    
                    <div class="bg-zinc-900/50 border border-zinc-800 rounded-3xl p-12 border-dashed flex items-center justify-center h-64">
                        <div class="text-center">
                            <div class="inline-block h-8 w-8 border-2 border-zinc-700 border-t-indigo-500 rounded-full animate-spin mb-4"></div>
                            <p class="text-zinc-500 text-sm">Syncing with Backend Engine...</p>
                        </div>
                    </div>

                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-zinc-900/50 border border-zinc-800 rounded-2xl p-6">
                    <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-6">Engine Parameters</h3>
                    <ul class="space-y-4">
                        <li class="flex justify-between items-center">
                            <span class="text-sm text-zinc-500">Baseline</span>
                            <span class="text-sm text-zinc-300 font-medium">5.05 GB PCAP</span>
                        </li>
                        <li class="flex justify-between items-center">
                            <span class="text-sm text-zinc-500">Target Accuracy</span>
                            <span class="text-sm text-emerald-500 font-bold">95.2%</span>
                        </li>
                        <li class="flex justify-between items-center border-t border-zinc-800/50 pt-4">
                            <span class="text-sm text-zinc-500">Logic</span>
                            <span class="text-sm text-zinc-300 font-medium italic">First 8 Packets</span>
                        </li>
                    </ul>
                </div>

                <div class="p-6">
                    <p class="text-[10px] text-zinc-600 leading-relaxed uppercase tracking-wider">
                        Real-time classification using Random Forest architecture. 54 statistical features extracted per flow.
                    </p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
